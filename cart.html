<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Cart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h1>My Cart</h1></header>
    <main style="padding: 20px;">
        <ul class="cart-list">
            <li class="cart-item">
                <img src="serum.jpg" alt="Serum">
                <div>
                    <h3>Radiance Vitamin C Serum</h3>
                    <p>₱250.00</p>
                </div>
                <input type="number" value="1" min="1" style="width: 50px;">
            </li>
        </ul>
        <section style="margin-top: 20px; border-top: 1px solid #eee; padding-top: 10px;">
            <h3>Subtotal: ₱250.00</h3>
            <br>
            <a href="checkout.html" style="background: #28a745; color: white; padding: 10px 20px; border-radius: 4px;">Checkout</a>
        </section>
    </main>
</body>
</html>
