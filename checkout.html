<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="main-container checkout-layout">
        <section class="shipping-section">
            <h2>Shipping Details</h2>
            <form>
                <fieldset style="padding: 15px; border: 1px solid #ddd;">
                    <legend>Address</legend>
                    <label>Full Name:</label><br>
                    <input type="text" required style="width:100%;"><br><br>
                    <label>Street:</label><br>
                    <input type="text" required style="width:100%;">
                </fieldset>
                <br>
                <button type="submit" style="padding: 10px 20px;">Place Order</button>
            </form>
        </section>

        <aside class="summary-section" style="background:#fff; padding: 20px; border: 1px solid #eee;">
            <h2>Order Summary</h2>
            <p>Items: ₱450.00</p>
            <p>Shipping: ₱50.00</p>
            <hr><br>
            <p><strong>Total: ₱500.00</strong></p>
        </aside>
    </main>
</body>
</html>
